<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4466FF"/>
      <stop offset="100%" stop-color="#00CCFF"/>
    </linearGradient>
    <linearGradient id="slashGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8866FF"/>
      <stop offset="100%" stop-color="#5544EE"/>
    </linearGradient>
  </defs>
  <!-- Hexagon outline (pointy-top) -->
  <polygon points="32,3 55,16 55,42 32,55 9,42 9,16"
           fill="none" stroke="url(#hexGrad)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Three forward slashes /// -->
  <line x1="21" y1="16" x2="25" y2="28" stroke="url(#slashGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="16" x2="32" y2="28" stroke="url(#slashGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="35" y1="16" x2="39" y2="28" stroke="url(#slashGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Lock body -->
  <rect x="20" y="36" width="24" height="17" rx="3" fill="none" stroke="#00CCFF" stroke-width="2"/>
  <!-- Lock shackle -->
  <path d="M25 36 L25 30 A7 7 0 0 1 39 30 L39 36" fill="none" stroke="#00CCFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Keyhole circle -->
  <circle cx="32" cy="45" r="3" fill="#00CCFF"/>
  <!-- Keyhole slot -->
  <rect x="30.5" y="45" width="3" height="5" rx="1.5" fill="#00CCFF"/>
</svg>
