name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (например v1.0.5)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_B64" | base64 --decode > android/devomnix.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../devomnix.jks
          EOF

      - name: Download hiddify-core AAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download 1.2.2 \
            --repo Den4ik250/DevOmnixVPNapp \
            --pattern "hiddify-core.aar" \
            --dir android/app/libs/

      - name: Get dependencies
        run: flutter pub get

      - name: Patch simple_icons (Flutter 3.44.0 compat)
        run: |
          python3 << 'PYEOF'
          import re, os, glob

          base = os.path.expanduser("~/.pub-cache/hosted/pub.dev/simple_icons-14.6.1/lib/src")

          # 1. Patch icon_data.dart — stub SimpleIconData so it no longer extends IconData
          stub = os.path.join(base, "icon_data.dart")
          if os.path.exists(stub):
              with open(stub, "w") as f:
                  f.write(
                      "import 'package:flutter/widgets.dart';\n"
                      "IconData simpleIconData(int codePoint) => IconData(\n"
                      "  codePoint,\n"
                      "  fontFamily: 'SimpleIcons',\n"
                      "  fontPackage: 'simple_icons',\n"
                      ");\n"
                      "class SimpleIconData {\n"
                      "  final int codePoint;\n"
                      "  const SimpleIconData(this.codePoint);\n"
                      "}\n"
                  )
              print(f"Patched: {stub}")

          # 2. Patch icon_data.g.dart — replace "= SimpleIconData(0xHEX)" with IconData(...)
          gen = os.path.join(base, "icon_data.g.dart")
          if os.path.exists(gen):
              with open(gen) as f:
                  content = f.read()
              if "package:flutter/widgets.dart" not in content:
                  content = "import 'package:flutter/widgets.dart';\n" + content
              content = re.sub(
                  r"= SimpleIconData\(0x([0-9a-fA-F]+)\);",
                  r"= IconData(0x\1, fontFamily: 'SimpleIcons', fontPackage: 'simple_icons');",
                  content,
              )
              content = content.replace("static const SimpleIconData ", "static const IconData ")
              with open(gen, "w") as f:
                  f.write(content)
              print(f"Patched: {gen}")
          PYEOF

      - name: Patch installed_apps (FLAG_UPDATED_SYSTEM_APP fix)
        run: |
          PLUGIN_KT=$(find ~/.pub-cache -path "*/installed_apps*/InstalledAppsPlugin.kt" | head -1)
          if [ -n "$PLUGIN_KT" ]; then
            sed -i \
              's/(appInfo\.flags and ApplicationInfo\.FLAG_SYSTEM) != 0/(appInfo.flags and ApplicationInfo.FLAG_SYSTEM) != 0 \&\& (appInfo.flags and ApplicationInfo.FLAG_UPDATED_SYSTEM_APP) == 0/' \
              "$PLUGIN_KT"
            echo "Patched: $PLUGIN_KT"
          else
            echo "installed_apps plugin not found, skipping patch"
          fi

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Set version from tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          VERSION_NUM="${VERSION#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NUM"
          BUILD_NUM=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "Setting version to ${VERSION_NUM}+${BUILD_NUM}"
          sed -i "s/^version: .*/version: ${VERSION_NUM}+${BUILD_NUM}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Build release APK
        run: flutter build apk --release

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false
          body: |
            DevOmnix VPN ${{ steps.version.outputs.tag }}

      - name: Update appcast.xml
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Берём свежую main в отдельную рабочую копию, не трогая detached HEAD тега
          git fetch origin main
          git checkout -B main origin/main

          # Обновляем appcast.xml
          sed -i "s|<enclosure url=\"[^\"]*\"|<enclosure url=\"https://github.com/${{ github.repository }}/releases/download/v${VERSION}/app-release.apk\"|g" appcast.xml
          sed -i "s|sparkle:version=\"[^\"]*\"|sparkle:version=\"${VERSION}\"|g" appcast.xml

          # Коммитим только если есть изменения
          if git diff --quiet appcast.xml; then
            echo "appcast.xml не изменился, пропускаем"
          else
            git add appcast.xml
            git commit -m "chore: update appcast.xml to v${VERSION} [skip ci]"
            # Повтор пуша с подтягиванием свежих изменений при гонке
            for i in 1 2 3; do
              git pull origin main --rebase && git push origin main && break
              echo "Попытка $i не удалась, повтор..."
              sleep 3
            done
          fi

  sync-backend-version:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Extract version from tag
        id: version
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update backend .env via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            ENV_FILE="/opt/backend-vpn/.env"
            VERSION="${{ steps.version.outputs.APP_VERSION }}"
            if grep -q "^APP_LATEST_VERSION=" "$ENV_FILE"; then
              sed -i "s/^APP_LATEST_VERSION=.*/APP_LATEST_VERSION=${VERSION}/" "$ENV_FILE"
            else
              echo "APP_LATEST_VERSION=${VERSION}" >> "$ENV_FILE"
            fi
            echo "Updated APP_LATEST_VERSION to ${VERSION}"
            cd /opt/backend-vpn
            docker compose up -d --force-recreate
            echo "Backend restarted"
