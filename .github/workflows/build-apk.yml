name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (например v1.0.5)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_B64" | base64 --decode > android/devomnix.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../devomnix.jks
          EOF

      - name: Download hiddify-core AAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download 1.2.2 \
            --repo Den4ik250/DevOmnixVPNapp \
            --pattern "hiddify-core.aar" \
            --dir android/app/libs/

      - name: Get dependencies
        run: flutter pub get

      - name: Patch simple_icons (Flutter 3.44.0 compat)
        run: |
          python3 << 'PYEOF'
          import re, os, glob

          base = os.path.expanduser("~/.pub-cache/hosted/pub.dev/simple_icons-14.6.1/lib/src")

          # 1. Patch icon_data.dart — stub SimpleIconData so it no longer extends IconData
          stub = os.path.join(base, "icon_data.dart")
          if os.path.exists(stub):
              with open(stub, "w") as f:
                  f.write(
                      "import 'package:flutter/widgets.dart';\n"
                      "IconData simpleIconData(int codePoint) => IconData(\n"
                      "  codePoint,\n"
                      "  fontFamily: 'SimpleIcons',\n"
                      "  fontPackage: 'simple_icons',\n"
                      ");\n"
                      "class SimpleIconData {\n"
                      "  final int codePoint;\n"
                      "  const SimpleIconData(this.codePoint);\n"
                      "}\n"
                  )
              print(f"Patched: {stub}")

          # 2. Patch icon_data.g.dart — replace "= SimpleIconData(0xHEX)" with IconData(...)
          gen = os.path.join(base, "icon_data.g.dart")
          if os.path.exists(gen):
              with open(gen) as f:
                  content = f.read()
              if "package:flutter/widgets.dart" not in content:
                  content = "import 'package:flutter/widgets.dart';\n" + content
              content = re.sub(
                  r"= SimpleIconData\(0x([0-9a-fA-F]+)\);",
                  r"= IconData(0x\1, fontFamily: 'SimpleIcons', fontPackage: 'simple_icons');",
                  content,
              )
              content = content.replace("static const SimpleIconData ", "static const IconData ")
              with open(gen, "w") as f:
                  f.write(content)
              print(f"Patched: {gen}")
          PYEOF

      - name: Patch installed_apps (FLAG_UPDATED_SYSTEM_APP fix)
        run: |
          PLUGIN_KT=$(find ~/.pub-cache -path "*/installed_apps*/InstalledAppsPlugin.kt" | head -1)
          if [ -n "$PLUGIN_KT" ]; then
            sed -i \
              's/(appInfo\.flags and ApplicationInfo\.FLAG_SYSTEM) != 0/(appInfo.flags and ApplicationInfo.FLAG_SYSTEM) != 0 \&\& (appInfo.flags and ApplicationInfo.FLAG_UPDATED_SYSTEM_APP) == 0/' \
              "$PLUGIN_KT"
            echo "Patched: $PLUGIN_KT"
          else
            echo "installed_apps plugin not found, skipping patch"
          fi

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false
          body: |
            DevOmnix VPN ${{ steps.version.outputs.tag }}

      - name: Update appcast.xml
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git checkout main
          git pull origin main --rebase
          sed -i "s|<enclosure url=\"[^\"]*\"|<enclosure url=\"https://github.com/${{ github.repository }}/releases/download/v${VERSION}/app-arm64-v8a-release.apk\"|g" appcast.xml
          sed -i "s|sparkle:version=\"[^\"]*\"|sparkle:version=\"${VERSION}\"|g" appcast.xml
          git add appcast.xml
          git commit -m "chore: update appcast.xml to v${VERSION} [skip ci]" || echo "Nothing to commit"
          git push origin main

      - name: Notify backend — set new version
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          # Убираем префикс "v" → "1.2.6"
          VERSION_NUM=${VERSION#v}
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://78.17.100.87/admin/set-version \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"version\": \"$VERSION_NUM\"}" \
          | grep -q "^200$" && echo "✅ Backend version updated to $VERSION_NUM" \
            || echo "⚠️  Backend update failed (non-critical, check manually)"
