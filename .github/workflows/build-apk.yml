name: Build & Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_B64" | base64 --decode > android/devomnix.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../devomnix.jks
          EOF

      - name: Download hiddify-core AAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download 1.2.2 \
            --repo Den4ik250/DevOmnixVPNapp \
            --pattern "hiddify-core.aar" \
            --dir android/app/libs/

      - name: Get dependencies
        run: flutter pub get

      - name: Patch simple_icons (Flutter 3.44.0 compat)
        run: |
          python3 << 'PYEOF'
          import re, os, glob

          base = os.path.expanduser("~/.pub-cache/hosted/pub.dev/simple_icons-14.6.1/lib/src")

          # 1. Patch icon_data.dart — stub SimpleIconData so it no longer extends IconData
          stub = os.path.join(base, "icon_data.dart")
          if os.path.exists(stub):
              with open(stub, "w") as f:
                  f.write(
                      "import 'package:flutter/widgets.dart';\n"
                      "IconData simpleIconData(int codePoint) => IconData(\n"
                      "  codePoint,\n"
                      "  fontFamily: 'SimpleIcons',\n"
                      "  fontPackage: 'simple_icons',\n"
                      ");\n"
                      "class SimpleIconData {\n"
                      "  final int codePoint;\n"
                      "  const SimpleIconData(this.codePoint);\n"
                      "}\n"
                  )
              print(f"Patched: {stub}")

          # 2. Patch icon_data.g.dart — replace "= SimpleIconData(0xHEX)" with IconData(...)
          #    Handles both field-type variants: "const IconData X = SimpleIconData(...)"
          #    and "const SimpleIconData X = SimpleIconData(...)"
          gen = os.path.join(base, "icon_data.g.dart")
          if os.path.exists(gen):
              with open(gen) as f:
                  content = f.read()
              if "package:flutter/widgets.dart" not in content:
                  content = "import 'package:flutter/widgets.dart';\n" + content
              content = re.sub(
                  r"= SimpleIconData\(0x([0-9a-fA-F]+)\);",
                  r"= IconData(0x\1, fontFamily: 'SimpleIcons', fontPackage: 'simple_icons');",
                  content,
              )
              # Also fix field type declarations "const SimpleIconData X" → "const IconData X"
              content = content.replace("static const SimpleIconData ", "static const IconData ")
              with open(gen, "w") as f:
                  f.write(content)
              print(f"Patched: {gen}")
          PYEOF

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false
          body: |
            DevOmnix VPN ${{ steps.version.outputs.tag }}
